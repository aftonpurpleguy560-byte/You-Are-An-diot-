<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YOU ARE AN IDIOT - Sans Edition</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJpZzRreXZid2R4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZ2VudGlmaWVyJmN0PWc/UCWmgOshU7f7Z/giphy.gif">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="content">
        <h1 class="glitch">YOU ARE AN IDIOT!</h1>
        <img id="sans-img" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJpZzRreXZid2R4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZ2VudGlmaWVyJmN0PWc/UCWmgOshU7f7Z/giphy.gif" alt="Sans">
        
        <div class="controls">
            <button onclick="badTime()" id="start-btn">
                DO YOU WANT TO HAVE A BAD TIME?
            </button>
        </div>
    </div>

    <audio id="megalovania" loop>
        <source src="mus_zz_megalovania.ogg" type="audio/ogg">
        Tarayıcın ses desteği sunmuyor aga.
    </audio>

    <script src="script.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker Kayıt Başarılı!', reg))
                    .catch(err => console.error('Kayıt Hatası:', err));
            });
        }

        // Tam Ekran Modu (Opsiyonel: Kullanıcı butona bastığında tetiklenir)
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Hata: ${err.message}`);
                });
            }
        }
        
        // Mevcut badTime fonksiyonuna tam ekranı ekleyelim
        const originalBadTime = window.badTime;
        window.badTime = function() {
            toggleFullScreen(); // Tableti tam ekran yap
            if(typeof originalBadTime === 'function') originalBadTime();
        };
    </script>
</body>
</html>
