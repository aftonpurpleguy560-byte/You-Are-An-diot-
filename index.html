<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YOU ARE AN IDIOT.EXE</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="content">
        <h1 class="glitch">YOU ARE AN IDIOT!</h1>
        
        <div class="controls">
            <button onclick="badTime()" id="start-btn">
                DO YOU WANT TO HAVE A BAD TIME?
            </button>
        </div>
    </div>

    <audio id="megalovania" loop>
        <source src="mus_zz_megalovania.ogg" type="audio/ogg">
    </audio>

    <script src="script.js"></script>

    <script>
        // Service Worker Kaydı
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }

        // Tam Ekran ve Kaos Başlatıcı
        function badTime() {
            // Tam ekran yap
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
            
            // script.js içindeki asıl fonksiyonu tetikle
            if (typeof window.startChaos === 'function') {
                window.startChaos();
            } else {
                // Eğer script.js'de fonksiyon ismi farklıysa burayı düzenleyebiliriz
                const audio = document.getElementById('megalovania');
                audio.play();
                document.getElementById('start-btn').style.display = 'none';
            }
        }
    </script>
</body>
</html>
